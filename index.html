<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TGO 硅谷分会活动列表</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main {
      width: min(640px, 100%);
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: 1.8rem;
      font-weight: 700;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 0.75rem;
    }

    a {
      display: block;
      padding: 1rem 1.1rem;
      border-radius: 12px;
      background: #1e293b;
      color: #93c5fd;
      text-decoration: none;
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    a:hover {
      background: #273449;
      color: #bfdbfe;
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .status {
      flex-shrink: 0;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      font-size: 0.8rem;
      border: 1px solid rgba(148, 163, 184, 0.24);
    }

    .status.open {
      color: #bbf7d0;
      background: rgba(20, 83, 45, 0.35);
      border-color: rgba(74, 222, 128, 0.24);
    }

    .status.ended {
      color: #fecaca;
      background: rgba(127, 29, 29, 0.5);
      border-color: rgba(248, 113, 113, 0.24);
    }
  </style>
</head>
<body>
  <main>
    <h1>活动列表</h1>
    <ul>
      <li>
        <a href="./202601/index.html">
          <span class="item">
            <span>2026.01 · Vibe Engineering in 2026.1</span>
            <span class="status" id="status-202601">报名中</span>
          </span>
        </a>
      </li>
      <li>
        <a href="./202603/index.html">
          <span class="item">
            <span>2026.03 · From Prompt to Product + Share Your 🦞</span>
            <span class="status" id="status-202603">报名中</span>
          </span>
        </a>
      </li>
    </ul>
  </main>

  <script>
    (function () {
      var now = new Date();
      var events = [
        { id: "status-202601", endTime: new Date(2026, 0, 24, 23, 59, 0, 0) },
        { id: "status-202603", endTime: new Date(2026, 2, 21, 23, 59, 0, 0) }
      ];

      events.forEach(function (event) {
        var badge = document.getElementById(event.id);
        if (!badge) {
          return;
        }
        if (now > event.endTime) {
          badge.textContent = "【活动已结束】";
          badge.className = "status ended";
        } else {
          badge.textContent = "报名中";
          badge.className = "status open";
        }
      });
    }());
  </script>
</body>
</html>
